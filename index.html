<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbXL1Y_NsoPSaYsTJ5OJCQjFemmQTj94AkZku0bxSi4oKvbpJ9KOHwkXE0mgXxmLZA40uwv4rkV1WG/pub?output=csv";

async function loadCard() {

    const params = new URLSearchParams(window.location.search);

    const id = params.get('id');

    if (!id) {

        document.body.innerHTML =
            "<h1>Link inválido.</h1>";

        return;
    }

    try {

        const response = await fetch(CSV_URL);

        const csvText = await response.text();

        const rows = csvText.split('\n').slice(1);

        let clienteEncontrado = null;

        rows.forEach(row => {

            const cols = row.split(',');

            const cliente = {
                id: cols[0]?.trim(),
                sellos: parseInt(cols[1]),
                nombre: cols[2]?.trim(),
                tel: cols[3]?.trim()
            };

            if (cliente.id === id) {

                clienteEncontrado = cliente;
            }
        });

        if (!clienteEncontrado) {

            document.body.innerHTML =
                "<h1>Cliente no encontrado.</h1>";

            return;
        }

        document.getElementById('card').style.display = 'block';

        document.getElementById('userName').innerText =
            clienteEncontrado.nombre;

        renderSteps(clienteEncontrado.sellos);

    } catch (error) {

        document.body.innerHTML =
            "<h1>Error cargando tarjeta.</h1>";

        console.error(error);
    }
}

function renderSteps(count) {

    const grid = document.getElementById('grid');

    const sauce = document.getElementById('sauceLayer');

    grid.innerHTML = '';

    sauce.style.width = (count / 9) * 100 + "%";

    for (let i = 1; i <= 9; i++) {

        const div = document.createElement('div');

        div.className =
            `step ${i <= count ? 'active' : ''}`;

        div.innerHTML = i === 9 ? "🎁" : i;

        grid.appendChild(div);
    }

    if (count >= 9) {

        document.getElementById('statusMsg').innerText =
            "¡FELICIDADES! Tienes un premio listo 🌭";
    }
}

loadCard();

</script>
