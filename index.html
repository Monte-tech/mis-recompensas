<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRbXL1Y_NsoPSaYsTJ5OJCQjFemmQTj94AkZku0bxSi4oKvbpJ9KOHwkXE0mgXxmLZA40uwv4rkV1WG/pub?output=csv";

async function loadCard() {

    const params = new URLSearchParams(window.location.search);

    const id = params.get('id');

    if (!id) {

        document.body.innerHTML =
        "<h1 style='color:white'>ID inválido</h1>";

        return;
    }

    try {

        const response = await fetch(CSV_URL);

        const text = await response.text();

        const rows = text.trim().split('\n');

        let found = null;

        for (let i = 1; i < rows.length; i++) {

            const cols = rows[i].split(',');

            const cliente = {
                id: cols[0]?.trim(),
                sellos: parseInt(cols[1]) || 0,
                nombre: cols[2]?.trim()
            };

            if (cliente.id === id) {

                found = cliente;

                break;
            }
        }

        if (!found) {

            document.body.innerHTML =
            "<h1 style='color:white'>Cliente no encontrado</h1>";

            return;
        }

        document.getElementById('card').style.display = 'block';

        document.getElementById('userName').innerText =
            found.nombre;

        renderSteps(found.sellos);

    } catch (err) {

        console.error(err);

        document.body.innerHTML =
        "<h1 style='color:white'>Error cargando tarjeta</h1>";
    }
}

function renderSteps(count) {

    const grid = document.getElementById('grid');

    const sauce = document.getElementById('sauceLayer');

    grid.innerHTML = '';

    sauce.style.width = ((count / 9) * 100) + "%";

    for (let i = 1; i <= 9; i++) {

        const div = document.createElement('div');

        div.className =
        `step ${i <= count ? 'active' : ''}`;

        div.innerHTML = i === 9 ? "🎁" : i;

        grid.appendChild(div);
    }

    if (count >= 9) {

        document.getElementById('statusMsg').innerText =
        "¡FELICIDADES! Premio desbloqueado 🌭";
    }
}

loadCard();

</script>
