<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panko Rewards</title>

<style>

:root{
    --bg-color:#43b1c9;
    --bun-color:#e3f6f9;
    --sausage-color:#61cbd9;
    --sauce-color:#f7e018;
    --white:#ffffff;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg-color);
    font-family:Arial, sans-serif;
    color:white;
    padding:20px;
}

.card{
    width:100%;
    max-width:380px;
    background:rgba(255,255,255,0.15);
    border:4px solid white;
    border-radius:30px;
    padding:30px 20px;
    backdrop-filter:blur(10px);
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.logo{
    font-size:2rem;
    font-weight:bold;
    margin-bottom:10px;
}

.welcome{
    opacity:.8;
    margin-bottom:5px;
}

.client-name{
    font-size:2rem;
    font-weight:bold;
    text-transform:uppercase;
    margin-bottom:20px;
}

.hotdog-container{
    position:relative;
    width:100%;
    height:100px;
    margin:30px 0;
}

.bun{
    position:absolute;
    width:100%;
    height:80px;
    top:10px;
    background:var(--bun-color);
    border:4px solid white;
    border-radius:40px;
}

.sausage{
    position:absolute;
    width:106%;
    left:-3%;
    top:30px;
    height:40px;
    background:var(--sausage-color);
    border:4px solid white;
    border-radius:30px;
    z-index:2;
}

.sauce{
    position:absolute;
    top:30px;
    left:0;
    width:0%;
    height:40px;
    overflow:hidden;
    z-index:3;
    transition:width 1s ease;
}

.sauce-svg{
    width:340px;
    height:40px;
    fill:none;
    stroke:var(--sauce-color);
    stroke-width:10;
    stroke-linecap:round;
}

.steps-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-top:25px;
}

.step{
    background:rgba(255,255,255,0.2);
    border:2px solid white;
    border-radius:15px;
    padding:15px 0;
    font-weight:bold;
    transition:.3s;
}

.step.active{
    background:var(--sauce-color);
    color:#333;
    transform:scale(1.05);
    border-color:var(--sauce-color);
}

.footer-msg{
    margin-top:25px;
    font-size:.95rem;
    opacity:.9;
}

.error{
    text-align:center;
    font-size:1.2rem;
    padding:20px;
}

</style>
</head>

<body>

<div class="card" id="card" style="display:none;">

    <div class="logo">🌭 PANKO</div>

    <div class="welcome">¡Hola!</div>

    <div class="client-name" id="userName">
        Cliente
    </div>

    <div class="hotdog-container">

        <div class="bun"></div>

        <div class="sausage"></div>

        <div class="sauce" id="sauceLayer">

            <svg class="sauce-svg" viewBox="0 0 340 40">

                <path d="M10,20 Q25,0 40,20 T70,20 T100,20 T130,20 T160,20 T190,20 T220,20 T250,20 T280,20 T310,20"/>

            </svg>

        </div>

    </div>

    <div class="steps-grid" id="grid"></div>

    <div class="footer-msg" id="statusMsg">
        Cada compra te acerca a tu premio 🌭
    </div>

</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQo1281Gd3SB8Bua6Xm1TItk_iOgImoVkX1xhWzOc1fpxzIeo3ZMfNm4oThLgEcguFmnIwNVK3_Q-gv/pub?output=csv";

async function loadCard() {

    const params = new URLSearchParams(window.location.search);

    const id = params.get('id');

    if (!id) {

        document.body.innerHTML =
        "<div class='error'>❌ ID inválido</div>";

        return;
    }

    try {

        const response = await fetch(CSV_URL);

        const text = await response.text();

        console.log(text);

        const rows = text.trim().split(/\r?\n/);

        let found = null;

        for (let i = 1; i < rows.length; i++) {

            const cols = rows[i]
            .replace(/\r/g, '')
            .split(',');

            const cliente = {

                id: cols[0]?.trim(),

                sellos: parseInt(cols[1]) || 0,

                nombre: cols[2]?.trim()

            };

            console.log(cliente);

            if (cliente.id === id) {

                found = cliente;

                break;
            }
        }

        console.log(found);

        if (!found) {

            document.body.innerHTML =
            "<div class='error'>❌ Cliente no encontrado</div>";

            return;
        }

        document.getElementById('card').style.display = 'block';

        document.getElementById('userName').innerText =
        found.nombre;

        renderSteps(found.sellos);

    } catch (error) {

        console.error(error);

        document.body.innerHTML =
        "<div class='error'>❌ Error cargando tarjeta</div>";
    }
}

function renderSteps(count) {

    const grid =
    document.getElementById('grid');

    const sauce =
    document.getElementById('sauceLayer');

    grid.innerHTML = '';

    sauce.style.width =
    ((count / 9) * 100) + "%";

    for (let i = 1; i <= 9; i++) {

        const div =
        document.createElement('div');

        div.className =
        `step ${i <= count ? 'active' : ''}`;

        div.innerHTML =
        i === 9 ? "🎁" : i;

        grid.appendChild(div);
    }

    if (count >= 9) {

        document.getElementById('statusMsg').innerText =
        "🎉 ¡FELICIDADES! Premio desbloqueado 🌭";
    }
}

loadCard();

// refresco automático
setInterval(loadCard, 30000);

</script>

</body>
</html>
